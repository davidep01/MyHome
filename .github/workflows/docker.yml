name: Build & Publish Docker Image

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/davidep01/myhome

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Build frontend
        run: npm ci && npm run build

      - name: Build backend
        run: cd backend && npm ci && npm run build

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # HA pulls {image}:{version}, so the image must carry a tag matching
      # the add-on version in ha-addon/config.yaml. Derive it automatically
      # so bumping the version there is the only thing needed to ship updates.
      - name: Read add-on version
        id: addon
        run: echo "version=$(grep '^version:' ha-addon/config.yaml | sed -E 's/version:[[:space:]]*"?([^"]+)"?/\1/')" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.addon.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
