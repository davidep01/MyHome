name: Build & Publish Docker Image

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/davidep01/myhome

# The last step pushes a version bump back to main. Serialize releases so two
# nearby pushes cannot publish an image tag and then race on that git update.
concurrency:
  group: myhome-release-main
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # commit the auto version bump back to the repo
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci --no-audit --no-fund

      - name: Install backend dependencies
        run: npm ci --prefix backend --no-audit --no-fund

      - name: Quality gates
        run: |
          npm run lint
          npm test
          npm run build
          npm run --prefix backend typecheck
          npm run build:backend
          npm audit --omit=dev --audit-level=high
          npm audit --prefix backend --omit=dev --audit-level=high

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Auto version: monotonically increasing, always above the 2.2.0 baseline.
      # HA only re-pulls an image-based app when its version increases, so we
      # bump it on every push. run_number strictly increases per workflow run.
      - name: Compute version
        id: ver
        run: echo "version=2.2.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          # BuildKit sets TARGETARCH independently for each target platform;
          # Dockerfile validates it, so it must not be overridden globally here.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.ver.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_VERSION=${{ steps.ver.outputs.version }}

      # Write the new version into the app manifest and commit it back, so the
      # HA Supervisor sees a newer version and (with Auto update on) installs it.
      # Pushing with GITHUB_TOKEN does not re-trigger this workflow.
      - name: Bump app version
        run: |
          sed -i -E 's/^version:.*/version: "${{ steps.ver.outputs.version }}"/' ha-addon/config.yaml
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ha-addon/config.yaml
          git commit -m "chore: release ${{ steps.ver.outputs.version }} [skip ci]"
          git push origin HEAD:main
