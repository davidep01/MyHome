name: Build & Publish Docker Image

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/davidep01/myhome

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # commit the auto version bump back to the repo
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Build frontend
        run: npm ci && npm run build

      - name: Build backend
        run: cd backend && npm ci && npm run build

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Auto version: monotonically increasing, always above the 2.2.0 baseline.
      # HA only re-pulls an image-based add-on when its version increases, so we
      # bump it on every push. run_number strictly increases per workflow run.
      - name: Compute version
        id: ver
        run: echo "version=2.2.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.ver.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Write the new version into the add-on manifest and commit it back, so the
      # HA Supervisor sees a newer version and (with Auto update on) installs it.
      # Pushing with GITHUB_TOKEN does not re-trigger this workflow.
      - name: Bump add-on version
        run: |
          sed -i -E 's/^version:.*/version: "${{ steps.ver.outputs.version }}"/' ha-addon/config.yaml
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ha-addon/config.yaml
          git commit -m "chore: release ${{ steps.ver.outputs.version }} [skip ci]"
          git push origin HEAD:main
