<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="preview.css"></head>
<body><div class="card-wrap" style="padding:20px">
  <div class="lbl" style="margin-bottom:14px">Radius &amp; spacing — 8px grid</div>
  <div class="row" style="gap:16px;align-items:flex-end">
    <div class="col" style="align-items:center;gap:6px"><div style="width:56px;height:48px;background:var(--canvas-card);border:1px solid var(--hairline);border-radius:8px"></div><span class="h">8 · util</span></div>
    <div class="col" style="align-items:center;gap:6px"><div style="width:56px;height:48px;background:var(--canvas-card);border:1px solid var(--hairline);border-radius:11px"></div><span class="h">11 · inner</span></div>
    <div class="col" style="align-items:center;gap:6px"><div style="width:56px;height:48px;background:var(--canvas-card);border:1px solid var(--hairline);border-radius:18px"></div><span class="h">18 · card</span></div>
    <div class="col" style="align-items:center;gap:6px"><div style="width:56px;height:48px;background:var(--canvas-card);border:1px solid var(--hairline);border-radius:999px"></div><span class="h">pill</span></div>
  </div>
  <div class="row" style="gap:0;margin-top:18px;align-items:center">
    <div style="height:14px;background:#0066cc;width:8px"></div><span class="h" style="margin:0 14px 0 6px">8</span>
    <div style="height:14px;background:#0066cc;width:12px"></div><span class="h" style="margin:0 14px 0 6px">12</span>
    <div style="height:14px;background:#0066cc;width:16px"></div><span class="h" style="margin:0 14px 0 6px">16</span>
    <div style="height:14px;background:#0066cc;width:24px"></div><span class="h" style="margin:0 14px 0 6px">24</span>
    <div style="height:14px;background:#0066cc;width:32px"></div><span class="h" style="margin:0 14px 0 6px">32</span>
  </div>
</div></body></html>
