<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="preview.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>.orb{width:50px;height:50px;border-radius:999px;display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:inset 0 1px 0 rgba(255,255,255,0.35)}.orb i{width:22px;height:22px}.sc{display:flex;flex-direction:column;align-items:center;gap:8px}.sc span{font-size:12px;font-weight:600;color:var(--ink-secondary)}</style></head>
<body><div class="card-wrap" style="padding:20px">
  <div class="lbl" style="margin-bottom:14px">Scenes — life, not config</div>
  <div class="row" style="gap:18px">
    <div class="sc"><div class="orb" style="background:#e8508d"><i data-lucide="music"></i></div><span>Music</span></div>
    <div class="sc"><div class="orb" style="background:#0a84ff"><i data-lucide="footprints"></i></div><span>Going out</span></div>
    <div class="sc"><div class="orb" style="background:#7c5cff"><i data-lucide="moon"></i></div><span>Night</span></div>
    <div class="sc"><div class="orb" style="background:#ff453a"><i data-lucide="clapperboard"></i></div><span>Movie</span></div>
    <div class="sc"><div class="orb" style="background:#ff9f0a"><i data-lucide="sun"></i></div><span>Morning</span></div>
    <div class="sc"><div class="orb" style="background:#30b15a"><i data-lucide="door-open"></i></div><span>Arrive</span></div>
  </div>
  <script>lucide.createIcons();</script>
</div></body></html>
