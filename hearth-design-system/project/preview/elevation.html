<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="preview.css"></head>
<body><div class="card-wrap" style="padding:22px 20px">
  <div class="lbl" style="margin-bottom:16px">Elevation — glass &amp; glow, not shadows</div>
  <div class="row" style="gap:16px">
    <div class="col" style="align-items:center;gap:8px">
      <div style="width:84px;height:60px;border-radius:14px;background:var(--canvas-card);border:1px solid var(--hairline);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px)"></div>
      <span class="h">glass</span></div>
    <div class="col" style="align-items:center;gap:8px">
      <div style="width:84px;height:60px;border-radius:14px;background:rgba(220,38,38,0.12);border:1px solid rgba(220,38,38,0.22);box-shadow:0 0 24px 0 rgba(220,38,38,0.32)"></div>
      <span class="h">glow · hot</span></div>
    <div class="col" style="align-items:center;gap:8px">
      <div style="width:84px;height:60px;border-radius:14px;background:rgba(234,179,8,0.12);border:1px solid rgba(234,179,8,0.30);box-shadow:0 0 24px 0 rgba(234,179,8,0.30)"></div>
      <span class="h">glow · light</span></div>
    <div class="col" style="align-items:center;gap:8px">
      <div style="width:84px;height:60px;border-radius:14px;background:#fff;box-shadow:3px 5px 30px rgba(0,0,0,0.22)"></div>
      <span class="h">product shadow</span></div>
  </div>
</div></body></html>
