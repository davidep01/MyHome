<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="preview.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>.ig{display:grid;grid-template-columns:repeat(10,1fr);gap:4px}.ig i{width:22px;height:22px;color:var(--ink)}.ib{display:flex;align-items:center;justify-content:center;height:38px;border-radius:10px;background:var(--canvas-card);border:1px solid var(--hairline)}</style></head>
<body><div class="card-wrap" style="padding:20px">
  <div class="row" style="justify-content:space-between;margin-bottom:12px"><span class="lbl">Iconography — Lucide, ~2px stroke</span><span style="font-size:11px;color:var(--ink-tertiary)">lucide.dev</span></div>
  <div class="ig">
    <div class="ib"><i data-lucide="lamp"></i></div><div class="ib"><i data-lucide="lightbulb"></i></div><div class="ib"><i data-lucide="thermometer-sun"></i></div><div class="ib"><i data-lucide="snowflake"></i></div><div class="ib"><i data-lucide="flame"></i></div><div class="ib"><i data-lucide="lock"></i></div><div class="ib"><i data-lucide="shield"></i></div><div class="ib"><i data-lucide="video"></i></div><div class="ib"><i data-lucide="bot"></i></div><div class="ib"><i data-lucide="blinds"></i></div>
    <div class="ib"><i data-lucide="plug-zap"></i></div><div class="ib"><i data-lucide="battery-full"></i></div><div class="ib"><i data-lucide="droplets"></i></div><div class="ib"><i data-lucide="wind"></i></div><div class="ib"><i data-lucide="sun"></i></div><div class="ib"><i data-lucide="moon"></i></div><div class="ib"><i data-lucide="cloud-rain"></i></div><div class="ib"><i data-lucide="bell"></i></div><div class="ib"><i data-lucide="sparkles"></i></div><div class="ib"><i data-lucide="house"></i></div>
  </div>
  <script>lucide.createIcons();</script>
</div></body></html>
