<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="preview.css"></head>
<body><div class="card-wrap" style="padding:20px">
  <div class="lbl" style="margin-bottom:14px">Functional state — device status only, never decoration</div>
  <div class="row" style="gap:12px">
    <div class="sw"><div class="chip" style="background:#dc2626"></div><span class="n">Hot</span><span class="h">heating ≥24°</span></div>
    <div class="sw"><div class="chip" style="background:#0066cc"></div><span class="n">Cold</span><span class="h">cooling ≤18°</span></div>
    <div class="sw"><div class="chip" style="background:#15803d"></div><span class="n">OK</span><span class="h">stable · open</span></div>
    <div class="sw"><div class="chip" style="background:#c2410c"></div><span class="n">Alert</span><span class="h">low batt.</span></div>
    <div class="sw"><div class="chip" style="background:#eab308"></div><span class="n">Light on</span><span class="h">amber glow</span></div>
  </div>
  <div class="row" style="gap:10px;margin-top:14px">
    <span style="font-size:11px;font-weight:600;padding:4px 10px;border-radius:999px;background:rgba(220,38,38,0.12);color:#dc2626">Riscaldamento</span>
    <span style="font-size:11px;font-weight:600;padding:4px 10px;border-radius:999px;background:rgba(0,102,204,0.10);color:#0066cc">Raffreddamento</span>
    <span style="font-size:11px;font-weight:600;padding:4px 10px;border-radius:999px;background:rgba(21,128,61,0.10);color:#15803d">Aperto</span>
    <span style="font-size:11px;font-weight:600;padding:4px 10px;border-radius:999px;background:rgba(180,83,9,0.12);color:#b45309">Offline</span>
  </div>
</div></body></html>
