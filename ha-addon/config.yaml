name: "S.I.M.I. Dashboard"
description: "Sistema Integrato di Monitoraggio Intelligente per Home Assistant"
version: "2.2.85"
slug: "myhome_dashboard"
url: "https://github.com/davidep01/MyHome"
init: false
startup: application
boot: auto
stage: stable
# `io.hass.type=app` is the current post-rename contract introduced with the
# Home Assistant 2026.2 Apps panel. Do not advertise an untested legacy floor.
homeassistant: "2026.2.0"
homeassistant_api: true
arch:
  - aarch64
  - amd64
image: "ghcr.io/davidep01/myhome"
webui: "http://[HOST]:[PORT:3001]/"
watchdog: "http://[HOST]:[PORT:3001]/api/health"
ports:
  3001/tcp: 3001
ports_description:
  3001/tcp: "S.I.M.I. Dashboard (web)"
map:
  - type: data
    read_only: false
options:
  ha_url: ""
  ha_token: ""
  admin_token: ""
  kiosk_token: ""
  openweather_key: ""
  gemini_key: ""
schema:
  ha_url: str?
  ha_token: password?
  admin_token: password?
  kiosk_token: password?
  openweather_key: password
  gemini_key: password
